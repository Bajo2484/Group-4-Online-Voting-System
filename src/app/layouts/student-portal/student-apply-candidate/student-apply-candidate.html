<div class="page">
  <div class="apply-candidate-container">

    <!-- Header / Instruction -->
    <div class="header">
      <h2>Apply as Candidate</h2>
      <p>
        Welcome! Use this form to submit your candidacy for the upcoming election. <br>
        Please fill out all required fields, upload a clear photo, and describe your platform.
      </p>
    </div>

    <!-- Candidate Form -->
    <form (ngSubmit)="submitApplication()" #candidateForm="ngForm" class="form-grid">

      <!-- Full Name -->
      <div class="form-group">
        <label for="fullName">Full Name <span style="color:red;">*</span></label>
        <input type="text" id="fullName" name="fullName" [(ngModel)]="candidate.fullName" required />
      </div>

      <!-- Organization -->
      <div class="form-group">
        <label for="organization">Organization <span style="color:red;">*</span></label>
        <select id="organization" name="organization" [(ngModel)]="candidate.organization" (change)="updatePositions()" required>
          <option value="" disabled selected>Select Organization</option>
          <option *ngFor="let org of organizations" [value]="org">{{ org }}</option>
        </select>
      </div>

      <!-- Position -->
      <div class="form-group">
        <label for="position">Position <span style="color:red;">*</span></label>
        <select id="position" name="position" [(ngModel)]="candidate.position" required>
          <option value="" disabled selected>Select Position</option>
          <option *ngFor="let pos of positions" [value]="pos">{{ pos }}</option>
        </select>
      </div>


      <div class="form-group">
        <label for="partyName">Party Name</label>
        <input type="text" id="partyName" name="partyName" [(ngModel)]="candidate.partyName" />
      </div>


      <div class="form-group">
        <label for="platform">Platform Description <span style="color:red;">*</span></label>
        <textarea id="platform" name="platform" [(ngModel)]="candidate.platform" rows="5" maxlength="500" required></textarea>
        <small>{{ candidate.platform.length || 0 }}/500 characters</small>
      </div>

 
      <div class="form-group">
        <label for="photo">Upload Photo</label>
        <input type="file" id="photo" (change)="onPhotoSelected($event)" accept="image/*" />
        <div class="photo-preview" *ngIf="photoPreview">
          <img [src]="photoPreview" alt="Photo Preview" />
        </div>
      </div>

      <div class="btn-area">
        <button type="submit" [disabled]="!candidateForm.form.valid">Submit Application</button>
      </div>

    </form>

  
    <div class="confirmation" *ngIf="submitted">
      Your application has been submitted successfully!
    </div>

  </div>
</div>
