<div class="page-wrapper">

  <!-- HEADER -->
  <div class="header">
    <h1>Candidate Application</h1>
    <p>Fill out the form below to apply as a candidate. All submissions require admin approval.</p>
  </div>

  <!-- GUIDELINES -->
  <div class="instructions-bar">
    <div class="instruction-checkbox">
      <input type="checkbox" id="agree-guidelines" [(ngModel)]="agreeInstructions">
      <label for="agree-guidelines">I understand the guidelines.</label>
    </div>
  </div>

  <!-- FORM CARD -->
  <div class="form-container">
    <div class="card horizontal">

      <!-- PHOTO -->
      <div class="photo-section">
        <div class="avatar">
          <img *ngIf="photoPreview; else defaultAvatar" [src]="photoPreview" alt="Photo Preview">
          <ng-template #defaultAvatar>
            <div class="default-avatar">No Photo</div>
          </ng-template>
        </div>
        <label class="upload-btn">
          Upload Photo
          <input type="file" hidden (change)="onFileSelected($event)">
        </label>
        <small>JPG or PNG only</small>
      </div>

      <!-- FORM FIELDS -->
      <div class="form-fields">

        <div class="form-group">
          <label>Full Name:</label>
          <input type="text" placeholder="Juan Dela Cruz" [(ngModel)]="fullName">
        </div>

        <div class="form-group">
          <label for="org">Organization:</label>
          <select
            id="org"
            [(ngModel)]="organization"
            (change)="onOrganizationChange()">
            <option value="">Select Organization</option>
            <option *ngFor="let org of organizations" [value]="org">{{ org }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="position">Position:</label>
          <select
            id="position"
            [(ngModel)]="position"
            [disabled]="!organization">
            <option value="">Select Position</option>
            <option *ngFor="let pos of filteredPositions" [value]="pos">{{ pos }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Party / Team:</label>
          <input type="text" placeholder="Unity Party" [(ngModel)]="party">
        </div>

        <div class="form-group">
          <label>Platform / Goals:</label>
          <textarea [(ngModel)]="platform" [maxLength]="maxCharacters" placeholder="State your plans..."></textarea>
          <div class="char-counter">{{ platform.length || 0 }} / {{ maxCharacters }} characters</div>
        </div>

        <!-- CONFIRMATION -->
        <div class="confirm-section">
          <input type="checkbox" id="confirm-checkbox" [(ngModel)]="confirm">
          <label for="confirm-checkbox">I confirm all information is true.</label>
        </div>

        <!-- BUTTONS -->
        <div class="buttons">
          <button class="cancel-btn" type="button" (click)="resetForm()">Cancel</button>
          <button
            class="submit-btn"
            type="button"
            [disabled]="!confirm || !agreeInstructions || !fullName || !organization || !position || !party || !platform || !photoPreview"
            (click)="submitApplication()">
            Submit
          </button>
        </div>

      </div>
    </div>
  </div>

</div>
