<div class="notifications-container">
  <h2>Notifications</h2>

  <div *ngIf="notifications.length === 0" class="no-notifications">
    No notifications yet.
  </div>

  <ul *ngIf="notifications.length > 0" class="notification-list">
    <li *ngFor="let n of notifications" [class.unseen]="!n.seen" (click)="markAsSeen(n)">
      <div class="message">{{ n.message }}</div>
      <div class="date">{{ n.date | date:'medium' }}</div>
      <div *ngIf="n.type === 'election'" class="countdown">
        {{ getRemainingDays(n.date) }} day(s) left
      </div>
    </li>
  </ul>

  <div *ngIf="unseenCount > 0" class="unseen-count">
    You have {{ unseenCount }} new notification{{ unseenCount > 1 ? 's' : '' }}.
  </div>
</div>
