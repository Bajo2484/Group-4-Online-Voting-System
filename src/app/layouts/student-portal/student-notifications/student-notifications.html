<div class="notifications-container">
  <h2>Notifications</h2>

    <div *ngIf="loading" class="loading-container">
    <div class="spinner"></div>
    <p>Loading notifications...</p>
  </div> 

  <ng-container *ngIf="!loading">

  <!-- Unseen Count -->
  <div *ngIf="unseenCount > 0" class="unseen-count">
    You have {{ unseenCount }} new notification{{ unseenCount > 1 ? 's' : '' }}.
  </div>


  <!-- No notifications message -->
  <div *ngIf="!loading && notifications.length === 0" class="no-notifications">
    No notifications yet.
  </div>

  <!-- Notification List -->
  <ul *ngIf="!loading && notifications.length > 0" class="notification-list">
    <li 
      *ngFor="let n of notifications" 
      [class.unseen]="!n.seen" 
      (click)="markAsSeen(n)"
    >
      <div class="message">{{ n.message }}</div>
      
      <!-- Date -->
      <div class="date">{{ n.date | date:'medium' }}</div>

      <!-- Countdown for election type -->
      <div *ngIf="n.type === 'election'" class="countdown">
        {{ getRemainingDays(n.date) }} day{{ getRemainingDays(n.date) > 1 ? 's' : '' }} left
      </div>
    </li>
  </ul>
  </ng-container>
</div>
