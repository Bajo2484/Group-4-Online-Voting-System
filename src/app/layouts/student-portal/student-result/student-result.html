<div class="result-page">

  <!-- TABS -->
  <div class="org-tabs">
    <button *ngFor="let org of orgList"
            [class.active]="activeOrg === org"
            (click)="setActiveOrg(org)">
      {{ org }}
    </button>
  </div>

  <!-- RESULTS -->
  <div *ngFor="let org of orgList">
    <div *ngIf="activeOrg === org">

      <h2>{{ org }} Results</h2>

      <div class="loading-spinner" *ngIf="isloading">
        loading result....
      </div>

      <div class="position-card" *ngFor="let position of getPositions(org)">

        <div class="position-header">
          <h3>{{ position.name }}</h3>
          <span class="total">
            Total Votes: {{ getTotalVotes(position) }}
          </span>
        </div>

        <div class="candidate-card"
             *ngFor="let candidate of getRankedCandidates(position)"
             [ngClass]="{'winner': candidate.isWinner}">

          <!-- IMAGE -->
          <img class="candidate-thumb"
               [src]="candidate.photo"
               (error)="candidate.photo='https://via.placeholder.com/40'">

          <!-- INFO -->
          <div class="info">

            <div class="name">
              #{{ candidate.rank }} {{ candidate.name }}
              <span *ngIf="candidate.rank === 1"></span>
            </div>

            <div class="votes">
              {{ candidate.votes }} votes ({{ getPercentage(candidate, position) }}%)
              <span *ngIf="candidate.isWinner" class="badge">WINNER</span>
            </div>

            <div class="progress">
              <div class="bar"
                   [style.width.%]="getPercentage(candidate, position)">
              </div>
            </div>

          </div>

        </div>

      </div>

    </div>
  </div>

</div>
