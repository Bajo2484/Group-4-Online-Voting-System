<div class="settings-wrapper-vertical">

  <!-- Sidebar Tabs -->
  <div class="sidebar-tabs">
    <button [class.active]="activeTab==='profile'" (click)="activeTab='profile'">Profile</button>
    <button [class.active]="activeTab==='notifications'" (click)="activeTab='notifications'">Notifications</button>
    <button [class.active]="activeTab==='security'" (click)="activeTab='security'">Security</button>
    <button [class.active]="activeTab==='faq'" (click)="activeTab='faq'">FAQ</button>
    <button class="logout-btn" (click)="logout()">Logout</button>
  </div>

  <!-- Main Content -->
  <div [ngSwitch]="activeTab" class="tab-content-vertical">

    <!-- PROFILE TAB -->
    <ng-container *ngSwitchCase="'profile'">
      <form #profileForm="ngForm" (ngSubmit)="updateProfile()" class="active-tab">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" [(ngModel)]="admin.fullName" name="fullName" required>
        </div>
        <div class="form-group">
          <label>Contact Number</label>
          <input type="text" [(ngModel)]="admin.contactNo" name="contactNo">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="admin.email" name="email" required>
        </div>
        <div class="form-group">
          <label>Language Preference</label>
          <select [(ngModel)]="admin.language" name="language">
            <option value="en">English</option>
            <option value="tl">Tagalog</option>
          </select>
        </div>
        <div class="form-group">
          <label>Theme</label>
          <select [(ngModel)]="admin.theme" name="theme">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
            <option value="system">System Default</option>
          </select>
        </div>
        <button class="btn-save" type="submit">Save Profile</button>
      </form>
    </ng-container>

    <!-- NOTIFICATIONS TAB -->
    <ng-container *ngSwitchCase="'notifications'">
      <div class="notifications-tab active-tab">
        <h2>Notification Settings</h2>

        <label class="switch">
          <input type="checkbox" [(ngModel)]="admin.receiveNotifications" name="receiveNotifications">
          <span class="slider round"></span>
        </label>
        <p>Receive notifications: {{ admin.receiveNotifications ? 'Yes' : 'No' }}</p>

        <hr>

        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="admin.notifElectionUpdates" name="notifElectionUpdates">
            Election Updates
          </label>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="admin.notifVotingReminders" name="notifVotingReminders">
            Voting Reminders
          </label>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="admin.notifResults" name="notifResults">
            Election Results
          </label>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="admin.notifSystemAlerts" name="notifSystemAlerts">
            System Alerts
          </label>
        </div>

        <hr>

        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="admin.notifEmail" name="notifEmail">
            Email
          </label>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="admin.notifSMS" name="notifSMS">
            SMS
          </label>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="admin.notifInApp" name="notifInApp">
            In-App
          </label>
        </div>

        <button class="btn-save" (click)="saveNotifications()">Save Notifications</button>
      </div>
    </ng-container>

    <!-- SECURITY TAB -->
    <ng-container *ngSwitchCase="'security'">
      <div class="security-tab active-tab">
        <h2>Security Settings</h2>

        <form #passwordForm="ngForm" (ngSubmit)="updatePassword()">
          <div class="form-group">
            <label>Current Password</label>
            <input type="password" [(ngModel)]="password.current" name="currentPassword" placeholder="Enter current password" required>
          </div>
          <div class="form-group">
            <label>New Password</label>
            <input type="password" [(ngModel)]="password.new" name="newPassword" placeholder="Enter new password" required>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" [(ngModel)]="password.confirm" name="confirmPassword" placeholder="Confirm new password" required>
          </div>
          <div class="error" *ngIf="password.new && password.confirm && password.new !== password.confirm">
            Passwords do not match
          </div>
          <button class="btn-save" type="submit" [disabled]="password.new !== password.confirm">Update Password</button>
        </form>

        <hr>

        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="admin.enable2FA" name="enable2FA">
            Enable Two-Factor Authentication (2FA)
          </label>
          <button class="btn-save" (click)="toggle2FA()">Toggle 2FA</button>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="admin.loginAlerts" name="loginAlerts">
            Receive login alerts
          </label>
        </div>

        <button class="btn-save" (click)="logoutAllDevices()">Logout from All Devices</button>
      </div>
    </ng-container>

    <!-- FAQ TAB -->
    <ng-container *ngSwitchCase="'faq'">
      <div class="faq-tab active-tab">
        <h2>Frequently Asked Questions</h2>

        <div class="faq-accordion">
          <div class="faq-item" *ngFor="let faq of faqs; let i = index" [class.open]="faq.open">
            <button class="faq-question" (click)="toggleFAQ(i)">
              {{ faq.q }}
              <span class="arrow">{{ faq.open ? '▲' : '▼' }}</span>
            </button>
            <div class="faq-answer" *ngIf="faq.open">
              {{ faq.a }}
            </div>
          </div>
        </div>
      </div>
    </ng-container>

  </div>
</div>
