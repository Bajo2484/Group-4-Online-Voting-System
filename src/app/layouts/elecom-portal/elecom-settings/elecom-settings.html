<div class="elecom-settings-container">
  <div class="settings-card">

    <!-- Profile Picture -->
    <div class="profile-picture-section">
      <!-- Circle avatar -->
      <img 
        *ngIf="profileImage; else defaultAvatar"
        [src]="profileImage" 
        alt="Profile Picture" 
        class="profile-picture" 
      />
      <ng-template #defaultAvatar>
        <div class="profile-picture placeholder"></div>
      </ng-template>

      <!-- Hidden file input -->
      <input type="file" id="fileInput" (change)="onFileSelected($event)" hidden />

      <!-- Stylish buttons -->
      <label for="fileInput" class="upload-btn">Choose Picture</label>
      <button 
        (click)="uploadProfilePicture()" 
        [disabled]="!selectedFile" 
        class="upload-confirm-btn"
      >
        Upload
      </button>
    </div>

    <!-- Personal Info -->
    <div class="personal-info-section">
      <label for="name">Name</label>
      <input id="name" type="text" [(ngModel)]="name" />

      <label for="email">Email</label>
      <input id="email" type="email" [value]="email" disabled />

      <button (click)="updateProfile()" class="update-btn">Update Profile</button>
    </div>

    <!-- Change Password -->
    <div class="password-section">
      <label for="currentPassword">Current Password</label>
      <input id="currentPassword" type="password" [(ngModel)]="currentPassword" />

      <label for="newPassword">New Password</label>
      <input id="newPassword" type="password" [(ngModel)]="newPassword" />

      <label for="confirmPassword">Confirm New Password</label>
      <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword" />

      <button (click)="changePassword()" class="change-password-btn">Change Password</button>
    </div>

    <!-- Logout -->
    <button class="logout-btn" (click)="logout()">Logout</button>

  </div>
</div>
