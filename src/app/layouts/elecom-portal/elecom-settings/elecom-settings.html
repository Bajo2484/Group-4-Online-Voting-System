<div class="settings-wrapper-vertical">

  <!-- Sidebar Tabs -->
  <div class="sidebar-tabs">
    <button [class.active]="activeTab==='profile'" (click)="activeTab='profile'">Profile</button>
    <button [class.active]="activeTab==='notifications'" (click)="activeTab='notifications'">Notifications</button>
    <button [class.active]="activeTab==='security'" (click)="activeTab='security'">Security</button>
    <button [class.active]="activeTab==='faq'" (click)="activeTab='faq'">FAQ</button>
    <button class="logout-btn" (click)="logout()">Logout</button>
  </div>

  <!-- Main Content -->
  <div [ngSwitch]="activeTab" class="tab-content-vertical">

    <!-- PROFILE TAB -->
    <ng-container *ngSwitchCase="'profile'">
      <form #profileForm="ngForm" (ngSubmit)="updateProfile()" class="active-tab">
        
        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input id="fullname" type="text" [(ngModel)]="elecom.fullName" name="fullName" required>
        </div>

        <div class="form-group">
          <label for="contactNo">Contact Number</label>
          <input id="contactNo" type="text" [(ngModel)]="elecom.contactNo" name="contactNo">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" [(ngModel)]="elecom.email" name="email" required>
        </div>

        <div class="form-group">
          <label for="language">Language Preference</label>
          <select id="language" [(ngModel)]="elecom.language" name="language">
            <option value="en">English</option>
            <option value="tl">Tagalog</option>
          </select>
        </div>
        <div class="form-group">
          <label for="theme">Theme</label>
          <select id="theme" [(ngModel)]="elecom.theme" name="theme">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
            <option value="system">System Default</option>
          </select>
        </div>
        <button class="btn-save" type="submit">Save Profile</button>
      </form>
    </ng-container>

    <!-- NOTIFICATIONS TAB -->
    <ng-container *ngSwitchCase="'notifications'">
      <div class="notifications-tab active-tab">
        <h2>Notification Settings</h2>

        <div class="form-group">
  
       <input
      type="checkbox"
      id="receiveNotifications"
      [(ngModel)]="elecom.receiveNotifications"
      name="receiveNotifications"
    >

      <label for="receiveNotifications" class="switch">
        <span class="slider round"></span>
      </label>

      <label for="receiveNotifications" class="switch-text">
        Receive Notifications
      </label>

    </div>
        
        <p>Receive notifications: {{ elecom.receiveNotifications ? 'Yes' : 'No' }}</p>

        <hr>

        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="elecom.notifElectionUpdates" name="notifElectionUpdates">
            Election Updates
          </label>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="elecom .notifVotingReminders" name="notifVotingReminders">
            Voting Reminders
          </label>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="elecom.notifResults" name="notifResults">
            Election Results
          </label>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="elecom.notifSystemAlerts" name="notifSystemAlerts">
            System Alerts
          </label>
        </div>

        <hr>

        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="elecom.notifEmail" name="notifEmail">
            Email
          </label>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="elecom.notifSMS" name="notifSMS">
            SMS
          </label>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="elecom.notifInApp" name="notifInApp">
            In-App
          </label>
        </div>

        <button class="btn-save" (click)="saveNotifications()">Save Notifications</button>
      </div>
    </ng-container>

    <!-- SECURITY TAB -->
    <ng-container *ngSwitchCase="'security'">
      <div class="security-tab active-tab">
        <h2>Security Settings</h2>

        <form #passwordForm="ngForm" (ngSubmit)="updatePassword()">
          <div class="form-group">
            <label for="currentPassword">Current Password</label>
            <input id="currentPassword" type="password" [(ngModel)]="password.current" name="currentPassword" placeholder="Enter current password" required>
          </div>
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input id="newPassword" type="password" [(ngModel)]="password.new" name="newPassword" placeholder="Enter new password" required>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" type="password" [(ngModel)]="password.confirm" name="confirmPassword" placeholder="Confirm new password" required>
          </div>

          <div class="error" *ngIf="password.new && password.confirm && password.new !== password.confirm">
            Passwords do not match
          </div>
          <button class="btn-save" type="submit" [disabled]="password.new !== password.confirm">Update Password</button>
        </form>

        <hr>

        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="elecom.enable2FA" name="enable2FA">
            Enable Two-Factor Authentication (2FA)
          </label>
          <button class="btn-save" (click)="toggle2FA()">Toggle 2FA</button>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="elecom.loginAlerts" name="loginAlerts">
            Receive login alerts
          </label>
        </div>

        <button class="btn-save" (click)="logoutAllDevices()">Logout from All Devices</button>
      </div>
    </ng-container>

    <!-- FAQ TAB -->
    <ng-container *ngSwitchCase="'faq'">
      <div class="faq-tab active-tab">
        <h2>Frequently Asked Questions</h2>

        <div class="faq-accordion">
          <div class="faq-item" *ngFor="let faq of faqs; let i = index" [class.open]="faq.open">
            <button class="faq-question" (click)="toggleFAQ(i)">
              {{ faq.q }}
              <span class="arrow">{{ faq.open ? '▲' : '▼' }}</span>
            </button>
            <div class="faq-answer" *ngIf="faq.open">
              {{ faq.a }}
            </div>
          </div>
        </div>
      </div>
    </ng-container>

  </div>
</div>
