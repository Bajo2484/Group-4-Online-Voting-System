<div class="header-row">
  <h2>Elecom Notifications</h2>

  <span *ngIf="unreadCount > 0" class="notif-badge">
    {{ unreadCount }}
  </span>
</div>

<!-- Loading Spinner -->
<div *ngIf="loading" class="spinner-container">
  <div class="spinner"></div>
</div>

<!-- No notifications message -->
<div *ngIf="!loading && notifications.length === 0" class="no-notifications">
  No notifications yet.
</div>

<!-- Notifications List -->
<div *ngFor="let notif of notifications" class="notification-card" [class.unseen]="!notif.seen">
  <div class="notif-header">
    <span class="notif-dot" [class.unseen-dot]="!notif.seen"></span>
    <span class="notif-message">{{ notif.message }}</span>
  </div>
  <div class="notif-footer">
    <span class="notif-date">{{ notif.createdAt | date:'medium' }}</span>
    <button 
      *ngIf="!notif.seen" 
      (click)="markAsSeen(notif.id); $event.stopPropagation()" 
      class="mark-seen-btn">
      Mark as Seen
    </button>
  </div>
</div>
