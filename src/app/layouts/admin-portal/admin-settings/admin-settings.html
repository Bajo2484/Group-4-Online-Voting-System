<div class="settings-wrapper-vertical">

  <!-- Sidebar Tabs -->
  <div class="sidebar-tabs">
    <button type="button" [class.active]="activeTab==='profile'" (click)="activeTab='profile'">Profile</button>
    <button type="button" [class.active]="activeTab==='notifications'" (click)="activeTab='notifications'">Notifications</button>
    <button type="button" [class.active]="activeTab==='security'" (click)="activeTab='security'">Security</button>
    <button type="button" [class.active]="activeTab==='faq'" (click)="activeTab='faq'">FAQ</button>
    <button type="button" class="logout-btn" (click)="logout()">Logout</button>
  </div>

  <!-- Main Content -->
  <div class="tab-content-vertical">

    <!-- PROFILE -->
    <div *ngIf="activeTab==='profile'" class="tab-panel profile-tab">
      <h2>Profile Settings</h2>

      <div class="profile-photo-wrapper">
        <img [src]="admin.profilePic || '/admin.jpg'" alt="Profile Picture" class="profile-photo">
        <button type="button" class="upload-btn" (click)="fileInput.click()">Upload Photo</button>
        <input type="file" #fileInput (change)="onFileSelected($event)" hidden>
      </div>

      <form #profileForm="ngForm" (ngSubmit)="updateProfile()">

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" [(ngModel)]="admin.fullName" name="fullName" required>
        </div>

        <div class="form-group">
          <label>Contact Number</label>
          <input type="text" [(ngModel)]="admin.contactNo" name="contactNo">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="admin.email" name="email" required>
        </div>

        <div class="form-group">
          <label>Language</label>
          <select [(ngModel)]="admin.language" name="language">
            <option value="en">English</option>
            <option value="tl">Tagalog</option>
          </select>
        </div>

        <!-- THEME -->
        <div class="form-group">
          <label>Theme</label>
          <select [(ngModel)]="admin.theme" name="theme" (change)="setTheme(admin.theme)">
  <option value="light">Light</option>
  <option value="dark">Dark</option>
</select>
        </div>

        <button type="submit" class="btn-save">Save Profile</button>
      </form>
    </div>

    <!-- NOTIFICATIONS -->
    <div *ngIf="activeTab==='notifications'" class="tab-panel notifications-tab">

      <h2>Notification Settings</h2>

      <label class="switch">
        <input type="checkbox" [(ngModel)]="admin.receiveNotifications" name="receiveNotifications">
        <span class="slider round"></span>
      </label>

      <p>Receive notifications: {{ admin.receiveNotifications ? 'Yes' : 'No' }}</p>

      <hr>

      <div class="form-group">
        <label><input type="checkbox" [(ngModel)]="admin.notifElectionUpdates" name="notifElectionUpdates"> Election Updates</label>
      </div>

      <div class="form-group">
        <label><input type="checkbox" [(ngModel)]="admin.notifVotingReminders" name="notifVotingReminders"> Voting Reminders</label>
      </div>

      <div class="form-group">
        <label><input type="checkbox" [(ngModel)]="admin.notifResults" name="notifResults"> Results</label>
      </div>

      <div class="form-group">
        <label><input type="checkbox" [(ngModel)]="admin.notifSystemAlerts" name="notifSystemAlerts"> System Alerts</label>
      </div>

      <hr>

      <div class="form-group">
        <label><input type="checkbox" [(ngModel)]="admin.notifEmail" name="notifEmail"> Email</label>
      </div>

      <div class="form-group">
        <label><input type="checkbox" [(ngModel)]="admin.notifSMS" name="notifSMS"> SMS</label>
      </div>

      <div class="form-group">
        <label><input type="checkbox" [(ngModel)]="admin.notifInApp" name="notifInApp"> In-App</label>
      </div>

      <button type="button" class="btn-save" (click)="saveNotifications()">Save Notifications</button>
    </div>

    <!-- SECURITY -->
    <div *ngIf="activeTab==='security'" class="tab-panel security-tab">

      <h2>Security Settings</h2>

      <form (ngSubmit)="updatePassword()">

        <div class="form-group">
          <label>Current Password</label>
          <input type="password" [(ngModel)]="password.current" name="currentPassword" required>
        </div>

        <div class="form-group">
          <label>New Password</label>
          <input type="password" [(ngModel)]="password.new" name="newPassword" required>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" [(ngModel)]="password.confirm" name="confirmPassword" required>
        </div>

        <div class="error" *ngIf="password.new && password.confirm && password.new !== password.confirm">
          Passwords do not match
        </div>

        <button type="submit" class="btn-save" [disabled]="password.new !== password.confirm">
          Update Password
        </button>
      </form>

      <hr>

      <div class="form-group">
        <label>
          <input type="checkbox" [(ngModel)]="admin.enable2FA" name="enable2FA">
          Enable 2FA
        </label>
        <button type="button" class="btn-save" (click)="toggle2FA()">Toggle 2FA</button>
      </div>

      <div class="form-group">
        <label>
          <input type="checkbox" [(ngModel)]="admin.loginAlerts" name="loginAlerts">
          Login Alerts
        </label>
      </div>

      

    </div>

    <!-- FAQ -->
    <div *ngIf="activeTab==='faq'" class="tab-panel faq-tab">

      <h2>Frequently Asked Questions</h2>

      <div class="faq-accordion">

        <div class="faq-item" *ngFor="let faq of faqs; let i = index">
          <button type="button" class="faq-question" (click)="toggleFAQ(i)">
            {{ faq.q }}
            <span>{{ faq.open ? '▲' : '▼' }}</span>
          </button>

          <div class="faq-answer" *ngIf="faq.open">
            {{ faq.a }}
          </div>
        </div>

      </div>

    </div>

  </div>
</div>
