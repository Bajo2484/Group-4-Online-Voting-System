<div class="settings-wrapper-vertical">

  <!-- Sidebar Tabs -->
  <div class="sidebar-tabs">
    <button type="button" [class.active]="activeTab==='profile'" (click)="activeTab='profile'">Profile</button>
    <button type="button" [class.active]="activeTab==='notifications'" (click)="activeTab='notifications'">Notifications</button>
    <button type="button" [class.active]="activeTab==='security'" (click)="activeTab='security'">Security</button>
    <button type="button" [class.active]="activeTab==='faq'" (click)="activeTab='faq'">FAQ</button>
    <button type="button" class="logout-btn" (click)="logout()">Logout</button>
  </div>

  <!-- Main Content -->
  <div class="tab-content-vertical">

    <!-- PROFILE -->
    <div *ngIf="activeTab==='profile'" class="tab-panel profile-tab">
      <h2>Profile Settings</h2>

      <div class="profile-photo-wrapper">
        <img [src]="admin.profilePic || '/admin.jpg'" alt="Profile Picture" class="profile-photo">
        <button type="button" class="upload-btn" (click)="fileInput.click()">Upload Photo</button>
        <input type="file" #fileInput (change)="onFileSelected($event)" hidden>
      </div>

      <form #profileForm="ngForm" (ngSubmit)="updateProfile()" autocomplete="on">

        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input id="fullname" type="text"
            [(ngModel)]="admin.fullName"
            name="fullName"
            required
            autocomplete="name">
        </div>

        <div class="form-group">
          <label for="contactNo">Contact Number</label>
          <input id="contactNo" type="text"
            [(ngModel)]="admin.contactNo"
            name="contactNo"
            autocomplete="tel">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email"
            [(ngModel)]="admin.email"
            name="email"
            required
            autocomplete="email">
        </div>

        <div class="form-group">
          <label for="language">Language</label>
          <select id="language"
            [(ngModel)]="admin.language"
            name="language"
            aria-label="Language selection">
            <option value="en">English</option>
            <option value="tl">Tagalog</option>
          </select>
        </div>

        <div class="form-group">
          <label for="theme">Theme</label>
          <select id="theme"
            [(ngModel)]="admin.theme"
            name="theme"
            (change)="setTheme(admin.theme)"
            aria-label="Theme selection">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>

        <button type="submit" class="btn-save">Save Profile</button>
      </form>
    </div>

    <!-- NOTIFICATIONS -->
    <div *ngIf="activeTab==='notifications'" class="tab-panel notifications-tab">
      <h2>Notification Settings</h2>

      <div class="form-group switch-group">
        <label for="receiveNotifications">Receive Notifications</label>
        <label class="switch">
          <input id="receiveNotifications"
            type="checkbox"
            [(ngModel)]="admin.receiveNotifications"
            name="receiveNotifications"
            aria-label="Receive Notifications">
          <span class="slider round"></span>
        </label>
      </div>

      <p>Receive notifications: {{ admin.receiveNotifications ? 'Yes' : 'No' }}</p>

      <hr>

      <div class="form-group checkbox-group">
        <input id="notifElectionUpdates" type="checkbox"
          [(ngModel)]="admin.notifElectionUpdates"
          name="notifElectionUpdates">
        <label for="notifElectionUpdates">Election Updates</label>
      </div>

      <div class="form-group checkbox-group">
        <input id="notifVotingReminders" type="checkbox"
          [(ngModel)]="admin.notifVotingReminders"
          name="notifVotingReminders">
        <label for="notifVotingReminders">Voting Reminders</label>
      </div>

      <div class="form-group checkbox-group">
        <input id="notifResults" type="checkbox"
          [(ngModel)]="admin.notifResults"
          name="notifResults">
        <label for="notifResults">Results</label>
      </div>

      <div class="form-group checkbox-group">
        <input id="notifSystemAlerts" type="checkbox"
          [(ngModel)]="admin.notifSystemAlerts"
          name="notifSystemAlerts">
        <label for="notifSystemAlerts">System Alerts</label>
      </div>

      <hr>

      <div class="form-group checkbox-group">
        <input id="notifEmail" type="checkbox"
          [(ngModel)]="admin.notifEmail"
          name="notifEmail">
        <label for="notifEmail">Email</label>
      </div>

      <div class="form-group checkbox-group">
        <input id="notifSMS" type="checkbox"
          [(ngModel)]="admin.notifSMS"
          name="notifSMS">
        <label for="notifSMS">SMS</label>
      </div>

      <div class="form-group checkbox-group">
        <input id="notifInApp" type="checkbox"
          [(ngModel)]="admin.notifInApp"
          name="notifInApp">
        <label for="notifInApp">In-App</label>
      </div>

      <button type="button" class="btn-save" (click)="saveNotifications()">Save Notifications</button>
    </div>

    <!-- SECURITY -->
    <div *ngIf="activeTab==='security'" class="tab-panel security-tab">
      <h2>Security Settings</h2>

      <form (ngSubmit)="updatePassword()" autocomplete="on">

        <div class="form-group">
          <label for="currentPassword">Current Password</label>
          <input id="currentPassword" type="password"
            [(ngModel)]="password.current"
            name="currentPassword"
            required
            autocomplete="current-password">
        </div>

        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input id="newPassword" type="password"
            [(ngModel)]="password.new"
            name="newPassword"
            required
            autocomplete="new-password">
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" type="password"
            [(ngModel)]="password.confirm"
            name="confirmPassword"
            required
            autocomplete="new-password">
        </div>

        <div class="error" *ngIf="password.new && password.confirm && password.new !== password.confirm">
          Passwords do not match
        </div>

        <button type="submit" class="btn-save" [disabled]="password.new !== password.confirm">
          Update Password
        </button>
      </form>

      <hr>

      <div class="form-group checkbox-group">
        <input id="enable2FA" type="checkbox"
          [(ngModel)]="admin.enable2FA"
          name="enable2FA">
        <label for="enable2FA">Enable 2FA</label>
        <button type="button" class="btn-save" (click)="toggle2FA()">Toggle 2FA</button>
      </div>

      <div class="form-group checkbox-group">
        <input id="loginAlerts" type="checkbox"
          [(ngModel)]="admin.loginAlerts"
          name="loginAlerts">
        <label for="loginAlerts">Login Alerts</label>
      </div>

    </div>

    <!-- FAQ -->
    <div *ngIf="activeTab==='faq'" class="tab-panel faq-tab">
      <h2>Frequently Asked Questions</h2>

      <div class="faq-accordion">
        <div class="faq-item" *ngFor="let faq of faqs; let i = index">
          <button type="button" class="faq-question" (click)="toggleFAQ(i)">
            {{ faq.q }}
            <span>{{ faq.open ? '▲' : '▼' }}</span>
          </button>

          <div class="faq-answer" *ngIf="faq.open">
            {{ faq.a }}
          </div>
        </div>
      </div>

    </div>

  </div>
</div>
