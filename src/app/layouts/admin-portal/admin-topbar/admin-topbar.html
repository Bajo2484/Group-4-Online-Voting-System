<header class="content-header">
    

  <!-- Hamburger -->
  <button class="hamburger" (click)="notifySidebarToggle()">☰</button>

  <!-- Title & Subtitle -->
  <div class="header-left">
    <h1 class="content-title">{{ title }}</h1>
    <p class="content-subtitle">{{ subtitle }}</p>
  </div>

  <!-- Topbar Right -->
  <div class="topbar-right">

    <!-- Notifications -->
    <div class="notification-icon">
      <span class="bell">🔔</span>
      <span class="badge" *ngIf="unseenCount > 0">{{ unseenCount }}</span>
    </div>

    <!-- Profile Dropdown -->
    <div class="profile-dropdown" (click)="toggleProfileMenu()">
      <img [src]="avatarUrl" alt="Avatar" class="profile-avatar">
      <span class="profile-name">{{ userName }}</span>
      <span class="dropdown-icon">▼</span>

      <ul class="dropdown-menu" [class.show]="isProfileMenuOpen">
        <li (click)="goToSettings(); $event.stopPropagation()">Settings</li>
        <li (click)="logout(); $event.stopPropagation()">Logout</li>
      </ul>
    </div>
  </div>

</header>
