<div class="page">
  <div class="profile-container">


    <div class="header">
      <h2>My Profile</h2>
      <p>View and update your personal information. You can also change your password here.</p>
    </div>


    <form class="form-grid">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [value]="studentName" readonly />
      </div>

      <div class="form-group">
        <label>Student ID</label>
        <input type="text" [value]="studentID" readonly />
      </div>

      <div class="form-group">
        <label>Department</label>
        <input type="text" [value]="department" readonly />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" />
      </div>

      <div class="btn-area">
        <button type="button" (click)="saveProfile()">Save Changes</button>
      </div>
    </form>


    <div class="password-section">
      <h3>Change Password</h3>
      <form class="form-grid">
        <div class="form-group">
          <label>Old Password</label>
          <input type="password" [(ngModel)]="oldPassword" name="oldPassword" />
        </div>

        <div class="form-group">
          <label>New Password</label>
          <input type="password" [(ngModel)]="newPassword" name="newPassword" />
        </div>

        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" />
        </div>

        <div class="btn-area">
          <button type="button" (click)="changePassword()">Update Password</button>
        </div>
      </form>
    </div>

   
    
  </div>
</div>
