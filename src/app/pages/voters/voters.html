<div class="page">

  <div class="header">
    <h2>Voters Management</h2>
    <button class="btn-add" (click)="openModal()">Add Voter</button>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Program</th>
        <th>Year</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let student of students">
        <td>{{ student.id }}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.course }}</td>
        <td>{{ student.yearLevel }}</td>
        <td>{{ student.status }}</td>
        <td>
          <button (click)="editStudent(student)">Edit</button>
          <button (click)="deleteStudent(student.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="modal" *ngIf="showModal">
    <div class="modal-content">
      <h3>{{ isEditMode ? 'Edit Voter' : 'Add Voter' }}</h3>

      <form (ngSubmit)="saveStudent()" class="form-grid">

        <input type="text" [(ngModel)]="newStudent.id" name="id" placeholder="Student ID" required />
        <input type="password" [(ngModel)]="newStudent.password" name="password" placeholder="Password" required />

        <input type="text" [(ngModel)]="newStudent.firstName" name="firstName" placeholder="First Name" required />
        <input type="text" [(ngModel)]="newStudent.middleName" name="middleName" placeholder="Middle Name" />
        <input type="text" [(ngModel)]="newStudent.lastName" name="lastName" placeholder="Last Name" required />

        <select [(ngModel)]="newStudent.gender" name="gender" required>
          <option value="">Select Gender</option>
          <option>Male</option>
          <option>Female</option>
        </select>

        <select [(ngModel)]="newStudent.course" name="course" required>
          <option value="">Select Program</option>
          <option *ngFor="let p of programs">{{ p }}</option>
        </select>

        <select [(ngModel)]="newStudent.yearLevel" name="yearLevel" required>
          <option value="">Select Year Level</option>
          <option *ngFor="let y of yearLevels">{{ y }}</option>
        </select>

        <select [(ngModel)]="newStudent.status" name="status" required>
          <option value="">Select Status</option>
          <option *ngFor="let s of statuses">{{ s }}</option>
        </select>

        <input type="text" [(ngModel)]="newStudent.section" name="section" placeholder="Section" required />
        <input type="email" [(ngModel)]="newStudent.email" name="email" placeholder="Email" required />
        <input type="text" [(ngModel)]="newStudent.mobile" name="mobile" placeholder="Mobile Number" required />

        <div class="modal-actions">
          <button type="submit">
            {{ isEditMode ? 'Update' : 'Save' }}
          </button>
          <button type="button" (click)="closeModal()">Cancel</button>
        </div>

      </form>
    </div>
  </div>

</div>
