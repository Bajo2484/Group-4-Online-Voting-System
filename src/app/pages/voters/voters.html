<div class="page">

  <!-- Header -->
  <div class="header">
    <div>
      <h2>Voters Management</h2>
      <p>Manage student voters and their accounts</p>
    </div>
    <button class="btn-add" (click)="openModal()">+ Add Voter</button>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" *ngIf="showModal">
    <div class="modal-card">
      <div class="modal-header">
        <h3>{{ isEditMode ? 'Edit Voter' : 'Add Voter' }}</h3>
        <button class="close-btn" (click)="closeModal()">×</button>
      </div>

      <form (ngSubmit)="saveStudent()" class="form-grid">

        <!-- ID & Password -->
        <div class="form-group">
          <label>Student ID</label>
          <input type="text" [(ngModel)]="newStudent.id" name="id" placeholder="Enter Student ID" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="newStudent.password" name="password" placeholder="Enter Password" required>
        </div>

        <!-- Name Group Horizontal -->
        <div class="form-group name-group">
          <input type="text" [(ngModel)]="newStudent.firstName" name="firstName" placeholder="First Name" required>
          <input type="text" [(ngModel)]="newStudent.middleName" name="middleName" placeholder="Middle Name">
          <input type="text" [(ngModel)]="newStudent.lastName" name="lastName" placeholder="Last Name" required>
        </div>

        <!-- Gender -->
        <div class="form-group">
          <label>Gender</label>
          <select [(ngModel)]="newStudent.gender" name="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
          </select>
        </div>

        <!-- Program / Course -->
        <div class="form-group">
          <label>Program</label>
          <select [(ngModel)]="newStudent.course" name="course" required>
            <option value="">Select Program</option>
            <option *ngFor="let p of programs">{{ p }}</option>
          </select>
        </div>

        <!-- Year & Status -->
        <div class="form-group">
          <label>Year Level</label>
          <select [(ngModel)]="newStudent.yearLevel" name="yearLevel" required>
            <option value="">Select Year Level</option>
            <option *ngFor="let y of yearLevels">{{ y }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Status</label>
          <select [(ngModel)]="newStudent.status" name="status" required>
            <option value="">Select Status</option>
            <option *ngFor="let s of statuses">{{ s }}</option>
          </select>
        </div>

        <!-- Section, Email, Mobile -->
        <div class="form-group">
          <label>Section</label>
          <input type="text" [(ngModel)]="newStudent.section" name="section" placeholder="Enter Section" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="newStudent.email" name="email" placeholder="Enter Email" required>
        </div>

        <div class="form-group">
          <label>Mobile Number</label>
          <input type="text" [(ngModel)]="newStudent.mobile" name="mobile" placeholder="Enter Mobile Number" required>
        </div>

        <!-- Modal Actions -->
        <div class="modal-actions">
          <button type="button" class="btn-cancel" (click)="closeModal()">Cancel</button>
          <button type="submit" class="btn-save">
            {{ isEditMode ? 'Update Voter' : 'Save Voter' }}
          </button>
        </div>

      </form>
    </div>
  </div>

  <!-- Voters Table -->
  <div class="card">
    <h3>Voter List</h3>

    <!-- Search Bar -->
    <div class="search-bar">
      <input 
        type="text" 
        placeholder="Search voters by ID, name, or program..." 
        [(ngModel)]="searchText" 
        (input)="filterVoters()"
      >
    </div>

    <table class="voter-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Full Name</th>
          <th>Program</th>
          <th>Year</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let student of filteredStudents">
          <td>{{ student.id }}</td>
          <td>{{ student.name }}</td>
          <td>{{ student.course }}</td>
          <td>{{ student.yearLevel }}</td>
          <td>{{ student.status }}</td>
          <td>
            <button class="edit-btn" (click)="editStudent(student)">Edit</button>
            <button class="delete-btn" (click)="deleteStudent(student.id)">Delete</button>
          </td>
        </tr>
        <tr *ngIf="filteredStudents.length === 0">
          <td colspan="6" style="text-align:center; padding:20px; color:#888;">
            No voters found.
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
