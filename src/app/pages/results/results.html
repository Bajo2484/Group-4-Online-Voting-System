<div class="result-page">

  <!-- Organization Tabs -->
  <div class="org-tabs">
    <button [class.active]="activeOrg==='ATLAS'" (click)="setActiveOrg('ATLAS')">ATLAS</button>
    <button [class.active]="activeOrg==='STCM'" (click)="setActiveOrg('STCM')">STCM</button>
    <button [class.active]="activeOrg==='AEMT'" (click)="setActiveOrg('AEMT')">AEMT</button>
    <button [class.active]="activeOrg==='USG'" (click)="setActiveOrg('USG')">USG</button>
  </div>

  <!-- Export PDF Button -->
  <div class="export-btn-container">
    <button class="btn-export" (click)="exportPDF(activeOrg)">
      Export {{ activeOrg }} PDF
    </button>
  </div>

  <!-- DYNAMIC RESULT DISPLAY -->
  <div class="org-section">
    <h2>{{ activeOrg }} Results</h2>

    <div class="position-card" *ngFor="let pos of getActivePositions()">
      <h3>{{ pos.name }}</h3>

      <ul>
        <li *ngFor="let candidate of pos.candidates">
          {{ candidate.name }} - {{ candidate.votes }} votes
          <span *ngIf="candidate.isWinner" class="winner-badge">
            Winner
          </span>
        </li>
      </ul>

    </div>
  </div>

</div>
