<div class="dashboard-container">

  <h1 class="welcome-title">Welcome, Elecom!</h1>
  <p class="subtitle">Here’s the current voting summary.</p>

  
  <div class="stats">
    <div class="card blue">
      <h3>Total Students</h3>
      <p>{{ totalStudents }}</p>
    </div>

    <div class="card green">
      <h3>Total Candidates</h3>
      <p>{{ totalCandidates }}</p>
    </div>

    <div class="card yellow">
      <h3>Overall Participation</h3>
      <p>{{ overallParticipation }}%</p>
    </div>
  </div>


  <div class="overview">
    <h2>Voting Overview</h2>

    <div class="empty-state">
      <p>No voting data available yet.</p>
      <small>Data will appear here once elections start.</small>
    </div>
  </div>

</div>
